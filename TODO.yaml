    idempotent on re-call — Hypothesis's freeze is). `pre_choice()` in
    `src/native/core/state.rs` already panics with `"Frozen: ..."` when
    `status.is_some()`, so post-freeze draws will fail correctly. For
    `test_calls_concluded_implicitly`, fold the `DataObserver` work
    into the separate observer TODO below and gate that test there.

    Acceptance criteria:
      - `test_cannot_draw_after_freeze`, `test_can_double_freeze`, and
        `test_calls_concluded_implicitly` compile and pass under
        `cargo test --features native --test hypothesis
        conjecture_test_data::`.
      - The matching bullets in `SKIPPED.md` (under
