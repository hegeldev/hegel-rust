# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     blocked_by:           # optional; list of titles that must be cleared
#       - Other entry title #   first. Blocked entries are kept in the queue
#                           #   but skipped by the dispatcher until every
#                           #   listed blocker is removed from TODO.yaml.
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Expose target() in the public hegel API
  details: |
    The native engine already has full target_observations infrastructure
    (src/native/optimiser.rs: TargetedRunner, TargetedTestCase.target_observations,
    src/native/conjecture_runner.rs). The server backend communicates scores via the
    protocol. But hegel-rust's public API exposes no way for test authors to call
    target(score, label).

    Hypothesis's public API is:
      from hypothesis import target
      target(observation: float, label: str = "")  # call inside @given body

    hegel-rust should expose an equivalent free function:
      pub fn target(score: f64, label: impl Into<String>)  # call inside test closure

    Implementation sketch:
    - Add `pub fn target(score: f64, label: impl Into<String>)` in src/lib.rs, similar
      to how `assume()` and `note()` are implemented (reads TEST_CASE_DATA thread-local,
      sends a protocol message or updates target_observations directly).
    - For the server backend: check what protocol message Hypothesis uses for
      target_observations and send it on the current stream.
    - For the native backend: update the thread-local TargetedTestCase's
      target_observations map directly.
    - Export `target` from the crate root so it's usable as `hegel::target(score, label)`.

    Acceptance criteria:
    - `hegel::target(score, "label")` compiles and can be called inside a test closure.
    - tests/hypothesis/test_targeting.rs ports and passes in both server and native mode.

