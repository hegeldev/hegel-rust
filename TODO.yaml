# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Port CPython's Lib/re/_parser.py and rewrite regex schema on it
  details: |
    `src/native/schema/regex.rs` currently leans on the `regex-syntax`
    crate to parse Python regexes. That's the anti-pattern: `regex-syntax`
    has Rust-regex semantics, which are close-but-not-identical to
    Python's `re` module (different escape handling, different
    ordering/scoping of flags, different character-class behaviour,
    different treatment of `\Z`, of named groups, of `\d\w\s` under
    ASCII vs Unicode, and so on). The current file has already grown a
    `translate_python_escapes` helper and several HIR walks to paper
    over the gap. When the test port tries to exercise anything
    non-trivial, the divergence bites.

    The fix is to stop adapting regex-syntax and instead port CPython's
    regex parser directly. The original:
    `https://raw.githubusercontent.com/python/cpython/refs/heads/main/Lib/re/_parser.py`
    (also mirrorable as `resources/cpython/Lib/re/_parser.py` once
    vendored). It's a straightforward top-down parser that produces
    CPython's internal `SubPattern`/`OP`-tuple AST — exactly the shape
    Hypothesis's `hypothesis.strategies._internal.regex` walks to build
    a generation strategy.

    Precedent: `src/native/unicodedata.rs` is the template for this
    kind of stdlib port — a self-contained module that mirrors the
    Python module's public API and vendors whatever supporting data
    it needs (Unicode 15.1.0 UCD in that case). Follow the same
    structure for the regex parser.

    Scope:
    1. Vendor (or reference by URL) the CPython `_parser.py` source.
       Also vendor its sibling `_constants.py` — the OP/AT/CATEGORY
       integer constants `_parser.py` emits are part of the public
       contract the rest of the code will consume.
    2. Create `src/native/re/parser.rs` (+ `mod.rs`, + a
       `re/constants.rs` mirror of `_constants.py`). Port the parser
       to a Rust function returning a `SubPattern` AST. Use Rust
       enums for the OP-tuple variants rather than stringly-typed
       tuples — keep the variant names matching the Python constants
       so cross-referencing stays trivial.
    3. Rewrite `src/native/schema/regex.rs` to use `native::re::parse`
       and walk the resulting AST directly. Drop the `regex-syntax`
       dependency from the schema path (it can stay in the workspace
       if another module still needs it — grep before removing from
       Cargo.toml).
    4. Add unit tests at `tests/embedded/native/re_parser_tests.rs`
       covering every OP the parser can emit, using CPython's own
       `sre_parse.parse(pat)` as an oracle during development (hand-
       transcribe the expected AST into each assertion; don't ship a
       Python dependency).

    Non-negotiables:
    - Do NOT reach for `regex-syntax`, `regex_automata`, `fancy-regex`,
      `onig`, or any other regex crate for a parser shim. Python's
      `re` module is the authoritative semantics; anything else is a
      near-miss that will break tests in subtle ways we then have to
      paper over.
    - Do NOT "simplify" by only porting the subset Hypothesis's
      regex strategy happens to exercise today. Port the whole
      parser. Hypothesis will reach further into the AST as more
      regex tests land and the partial port becomes its own source
      of drift.
    - Do NOT port `_compiler.py` / `_sre.c` (matching/execution).
      The parser alone is what Hypothesis's strategy needs; matching
      is handled by the Rust `regex` crate at test-runtime, which is
      fine because the test generator only needs to *produce* matching
      strings, not match them.

    Acceptance:
    - `src/native/re/parser.rs` exists, parses the full Python regex
      grammar `_parser.py` covers, and has direct-equivalent tests.
    - `src/native/schema/regex.rs` no longer depends on
      `regex-syntax` for parsing; it walks the new AST instead.
    - Previously-failing regex test ports (check recent git log
      around `hypothesis/test_regex.py`) pass without the escape-
      translation / HIR-walk workarounds.
    - Every SKIPPED.md entry whose rationale names regex-syntax
      divergence, `translate_python_escapes`, or Python `re`
      semantics mismatch is removed, with the corresponding test
      actually ported (or a tighter, non-semantics-divergence
      rationale substituted). Grep SKIPPED.md for `regex`,
      `translate_python_escapes`, and `re._parser` before declaring
      done; leftovers here mean the port missed the tests it was
      meant to unblock.
    - Commit each step as a focused commit (vendor → port parser →
      rewrite schema → port tests → unskip SKIPPED.md entries)
      rather than a single mega-commit.

- title: Port pbtkit/test_choice_index.py (native-gated to_index/from_index)
  details: |
    Previously skipped on "hegel-rust doesn't implement an index-based
    shrink pass" grounds. That's exactly the engine-internal-gap case
    the policy says to port-and-stub, not to skip.

    Hegel-rust's `src/native/core/choices.rs` currently exposes
    `to_index`/`from_index` only for `StringChoice`
    (see lines ~492 and ~511). `IntegerChoice`, `BooleanChoice`,
    `FloatChoice`, and `BytesChoice` need the same pair.

    Destination: `tests/pbtkit/choice_index.rs` with
    `#![cfg(feature = "native")]`. The tests cover the invariants
    `from_index(0) == simplest`, roundtrip, non-negativity,
    `from_index` → `to_index` <= original, and monotonicity with
    `sort_key`.

    Approach:
    - Port the six invariant tests using hegel generators for the
      choice kinds and values (see the upstream `st.composite`
      strategies as a template).
    - If `IntegerChoice::to_index` / `FloatChoice::to_index` / etc.
      are missing, stub them in `src/native/core/choices.rs` with
      `todo!("IntegerChoice::to_index not yet implemented")` rather
      than leaving the test body unimplemented.

    Acceptance:
    - `cargo test --features native --test pbtkit choice_index` builds
      and either passes or fails with a `todo!()` raised from
      `src/native/core/choices.rs`. No `todo!()` in the test body.
    - `SKIPPED.md` entry for `test_choice_index.py` has already been
      removed; don't re-add it.

- title: Port hypothesis/test_database_backend.py (portable portions)
  details: |
    The SKIPPED.md entry for this file previously rationalised a large
    chunk as "covered in Rust by tests/embedded/native/database_tests.rs"
    — the exact "already covered elsewhere" anti-pattern the current
    policy rejects. The audit removed that rationale; what remains in
    SKIPPED.md is only the genuinely Python-specific sub-bullets
    (GitHubArtifactDatabase, Hypothesis-specific wire-format bytes,
    `ExampleDatabase()` zero-arg factory / `_db_for_path`).

    Port the portable tests line-by-line to
    `tests/hypothesis/database_backend.rs`. That includes at minimum:
    - `test_backend_returns_what_you_put_in` (parametrized over
      `DirectoryBasedExampleDatabase` and `InMemoryExampleDatabase`)
    - `test_can_delete_keys`
    - `test_does_not_error_when_fetching_when_not_exist`
    - `test_can_delete_a_key_that_is_not_present`
    - `test_can_fetch_a_key_that_is_not_present`
    - `test_saving_a_key_twice_fetches_it_once`
    - `test_can_close_a_database_after_saving`
    - `test_class_name_is_in_repr` (adapt to `Debug` for Rust)
    - `test_an_absent_value_is_present_after_it_moves`
    - `test_an_absent_value_is_present_after_it_moves_to_self`
    - `test_two_directory_databases_can_interact`
    - `test_can_handle_disappearing_files`
    - `test_readonly_db_is_not_writable`
    - `test_multiplexed_dbs_read_and_write_all`
    - `test_background_write_database`
    - `test_database_listener_memory`, `test_database_listener_background_write`
    - `test_can_remove_nonexistent_listener`
    - `test_warns_when_listening_not_supported` (may be Python-specific —
      assess)
    - `test_readonly_listener`
    - `test_metakeys*`, `test_start_end_listening`
    - `test_database_equal` / `test_database_not_equal`
      (adapt to `PartialEq`)
    - `test_directory_db_removes_empty_dirs`

    Many of these already have counterparts in
    `tests/embedded/native/database_tests.rs`. Redundancy is fine per
    the policy ("redundancy is fine; incorrectly skipping a test costs
    real coverage"). A later rationalisation pass can deduplicate.

    Skip from the port (leave rationale in the existing SKIPPED.md
    sub-bullet, don't re-list):
    - `test_ga_*`, `TestGADReads`, `test_gadb_coverage`
      (GitHubArtifactDatabase: urllib/zipfile/GHA).
    - `test_nodes_roundtrips`, `test_uleb_128_roundtrips`
      (Hypothesis wire-format bytes; native layout differs).
    - `test_default_database_is_in_memory`,
      `test_default_on_disk_database_is_dir`,
      `test_database_directory_inaccessible`,
      `test_deprecated_example_database_*`
      (`ExampleDatabase()` factory / `_db_for_path`).

    Acceptance:
    - `tests/hypothesis/database_backend.rs` exists, is wired into
      `tests/hypothesis/main.rs`, and all ported tests compile and pass
      (or raise `todo!()` from `src/native/` if they hit a stub).
    - The SKIPPED.md entry for `test_database_backend.py` remains only
      as the three Python-specific sub-bullets (no "covered elsewhere"
      rationale).

- title: Review previously-skipped stateful tests against porting-stateful
  details: |
    Before `.claude/skills/porting-stateful/SKILL.md` existed,
    stateful-test ports were done ad-hoc: some whole files went into
    SKIPPED.md, and some individual stateful tests inside otherwise-
    ported files were dropped with `// TODO(port):` or similar notes
    because the right mapping wasn't documented. Now that there IS a
    documented mapping for every stateful construct except two (strategies
    that wrap bundles; name-based bundle introspection), many of those
    skips and drops are no longer justified.

    Scope:
    1. Grep SKIPPED.md for entries whose upstream file contains
       `RuleBasedStateMachine`, `@rule`, `@invariant`, `@initialize`,
       `@precondition`, `Bundle`, `consumes`, `multiple`, or
       `run_state_machine_as_test` (the trigger list from
       porting-stateful/SKILL.md). For each such entry, re-classify
       against the skill's skip policy and either keep the skip with a
       tightened rationale or remove it and port the file.
    2. Grep the tree (`tests/pbtkit/`, `tests/hypothesis/`, and any
       module docstrings listing "omitted" tests) for comments like
       `// TODO(port):`, `// skipped:`, or "omitted stateful test"
       inside otherwise-ported files. For each dropped stateful test,
       re-assess against the skill and either port it in place or
       tighten the comment to name the exact construct that blocks
       the port (must be one of the two genuinely unportable ones, or
       a policy-justified skip from the skill).
    3. Also re-check `resources/hypothesis/hypothesis-python/tests/
       nocover/test_stateful.py` if it's still unported — it's the
       stateful sibling of `cover/test_stateful.py` and pre-dates the
       skill.

    This is a survey + port task; if the review turns up N unblocked
    ports, it's fine to replace this TODO with narrower per-file port
    TODOs rather than doing them all at once.

    Acceptance:
    - Every stateful-related SKIPPED.md entry and every in-tree
      "dropped stateful test" comment either (a) has a rationale that
      matches `porting-stateful/SKILL.md`'s policy, or (b) has been
      removed in favour of a real port.
    - Commit message (or PR description if multiple commits) lists
      the entries/comments re-examined and what happened to each.
