  - title: "[CI] coverage job: nocov ratchet exceeded (3944 > 3918)"
    details: |
      The `coverage` job on PR 188 (run 24722796082) fails at `just
      check-coverage`. All tests pass and there are zero uncovered
      non-allowable code lines; the failure is that the `// nocov`
      annotation ratchet was exceeded by 26.

      Relevant log lines (from the `coverage	Run coverage` job):

          Line Coverage Analysis
          ======================

          Uncovered closing braces (allowed):           406
          Uncovered #[cfg(test)] code (allowed):        0
          Uncovered todo!/unreachable! (allowed):        66
          Uncovered macro continuations (allowed):      22
          Uncovered #[ignore]d test bodies (allowed):   0
          Uncovered #[cfg(windows)] code (allowed):     0
          Uncovered // nocov lines (allowed):           1647
          Uncovered code lines:                         0

          All uncovered lines are allowable patterns.

          Coverage annotations (nocov): 3944 // nocov

          Coverage annotation ratchet EXCEEDED!
            // nocov: 3944 (limit: 3918)

          The nocov ratchet may not be increased. Remove the
          annotations or add tests to cover the code.
          error: Recipe `check-coverage` failed on line 54 with exit code 1

      Per CLAUDE.md and the `coverage` skill, the ratchet number in
      `.github/coverage-ratchet.json` must NOT be increased without
      explicit human permission. Fix by removing `// nocov`
      annotations — either by adding tests that cover the annotated
      code, or by deleting the annotations on lines that are already
      covered. Recently-added native code is the likely source of the
      extra 26 annotations; audit files under `src/native/` added or
      modified on this branch for `// nocov` that can be dropped.

      Failing command: `just check-coverage` (workflow job: `coverage`).
