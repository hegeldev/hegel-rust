# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: "[CI] coverage ratchet: uncovered panic at src/server/runner.rs:282"
  details: |
    CI run 24632555538 (PR 188) — the `coverage` job fails at the
    ratchet step with one uncovered code line. All tests pass; the
    only failure is the coverage gate.

    Relevant log extract (from `just check-coverage`):

        Line Coverage Analysis
        ======================

        Uncovered closing braces (allowed):           69
        Uncovered #[cfg(test)] code (allowed):        0
        Uncovered todo!/unreachable! (allowed):        2
        Uncovered macro continuations (allowed):      4
        Uncovered #[ignore]d test bodies (allowed):   0
        Uncovered // nocov lines (allowed):           355
        Uncovered code lines:                         1

        Found uncovered CODE that requires tests:

          src/server/runner.rs:282: panic!(

        Add tests for the uncovered code, or if truly untestable,
        add a // nocov annotation.
        error: Recipe `check-coverage` failed on line 51 with exit code 1

    Failing job: `coverage` / `Run coverage` step
    (`just check-coverage`). The ratchet requires every new CODE line
    to be covered; either add a test that exercises the `panic!(` at
    `src/server/runner.rs:282`, or refactor so the path is
    genuinely unreachable. `// nocov` is NOT an acceptable fix
    without explicit human permission (see .claude/CLAUDE.md).

    Acceptance:
    - `just check-coverage` passes locally.
    - No new `// nocov` annotations.
    - No bumps to `.github/coverage-ratchet.json`.

- title: Port hypothesis/test_database_backend.py (portable portions)
  details: |
    The SKIPPED.md entry for this file previously rationalised a large
    chunk as "covered in Rust by tests/embedded/native/database_tests.rs"
    — the exact "already covered elsewhere" anti-pattern the current
    policy rejects. The audit removed that rationale; what remains in
    SKIPPED.md is only the genuinely Python-specific sub-bullets
    (GitHubArtifactDatabase, Hypothesis-specific wire-format bytes,
    `ExampleDatabase()` zero-arg factory / `_db_for_path`).

    Port the portable tests line-by-line to
    `tests/hypothesis/database_backend.rs`. That includes at minimum:
    - `test_backend_returns_what_you_put_in` (parametrized over
      `DirectoryBasedExampleDatabase` and `InMemoryExampleDatabase`)
    - `test_can_delete_keys`
    - `test_does_not_error_when_fetching_when_not_exist`
    - `test_can_delete_a_key_that_is_not_present`
    - `test_can_fetch_a_key_that_is_not_present`
    - `test_saving_a_key_twice_fetches_it_once`
    - `test_can_close_a_database_after_saving`
    - `test_class_name_is_in_repr` (adapt to `Debug` for Rust)
    - `test_an_absent_value_is_present_after_it_moves`
    - `test_an_absent_value_is_present_after_it_moves_to_self`
    - `test_two_directory_databases_can_interact`
    - `test_can_handle_disappearing_files`
    - `test_readonly_db_is_not_writable`
    - `test_multiplexed_dbs_read_and_write_all`
    - `test_background_write_database`
    - `test_database_listener_memory`, `test_database_listener_background_write`
    - `test_can_remove_nonexistent_listener`
    - `test_warns_when_listening_not_supported` (may be Python-specific —
      assess)
    - `test_readonly_listener`
    - `test_metakeys*`, `test_start_end_listening`
    - `test_database_equal` / `test_database_not_equal`
      (adapt to `PartialEq`)
    - `test_directory_db_removes_empty_dirs`

    Many of these already have counterparts in
    `tests/embedded/native/database_tests.rs`. Redundancy is fine per
    the policy ("redundancy is fine; incorrectly skipping a test costs
    real coverage"). A later rationalisation pass can deduplicate.

    Skip from the port (leave rationale in the existing SKIPPED.md
    sub-bullet, don't re-list):
    - `test_ga_*`, `TestGADReads`, `test_gadb_coverage`
      (GitHubArtifactDatabase: urllib/zipfile/GHA).
    - `test_nodes_roundtrips`, `test_uleb_128_roundtrips`
      (Hypothesis wire-format bytes; native layout differs).
    - `test_default_database_is_in_memory`,
      `test_default_on_disk_database_is_dir`,
      `test_database_directory_inaccessible`,
      `test_deprecated_example_database_*`
      (`ExampleDatabase()` factory / `_db_for_path`).

    Acceptance:
    - `tests/hypothesis/database_backend.rs` exists, is wired into
      `tests/hypothesis/main.rs`, and all ported tests compile and pass
      (or raise `todo!()` from `src/native/` if they hit a stub).
    - The SKIPPED.md entry for `test_database_backend.py` remains only
      as the three Python-specific sub-bullets (no "covered elsewhere"
      rationale).

- title: Fix `native_regex_unicode_class_empty_after_filter` slowness instead of suppressing TooSlow
  details: |
    `tests/test_native.rs::native_regex_unicode_class_empty_after_filter`
    currently passes only because commit 7afecf68 papered over a
    `HealthCheck::TooSlow` failure by adding
    `.suppress_health_check([HealthCheck::TooSlow])`. That was the
    wrong fix: the test is native-only (not a port — introduced in
    440dfc2), so there's no upstream source that also suppressed
    the check. A tripped TooSlow here is a real signal that the
    empty-class fullmatch path is slow enough for 10 Invalid draws
    to exceed the 1s threshold introduced in c438554.

    The test draws from
    `gs::from_regex("[a-z]+").fullmatch(true).alphabet(gs::characters().categories(&["Nd"]))`.
    Every draw is Invalid (the alphabet and class don't intersect).
    Candidates for the slowness:

    - unicode-category filtering inside `characters().categories(...)`
      re-scanning the codepoint table per draw,
    - regex HIR compile / rejection running per draw instead of
      being cached,
    - a rejection-sampling inner loop in the regex schema burning
      attempts before giving up on an empty class.

    Diagnose the actual cost (e.g. `cargo test --features native
    native_regex_unicode_class_empty_after_filter -- --nocapture`
    plus targeted prints, or a throwaway benchmark), fix the
    underlying path under `src/native/` or `src/generators/`, then
    remove `.suppress_health_check([HealthCheck::TooSlow])` from the
    test.

    Acceptance:
    - The `.suppress_health_check([HealthCheck::TooSlow])` call is
      removed from `native_regex_unicode_class_empty_after_filter`.
    - `HealthCheck` is no longer imported in `tests/test_native.rs`
      if that was its only use.
    - `cargo test --features native
      native_regex_unicode_class_empty_after_filter` passes with
      `.test_cases(10)` and no health-check suppression.
