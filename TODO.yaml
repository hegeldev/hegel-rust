# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Port Python's unicodedata (from UnicodeData.txt) for category queries
  details: |
    Hypothesis's text generation leans on Python's `unicodedata`
    module — in particular `unicodedata.category(c)` for General
    Category filtering (e.g. `characters(whitelist_categories=...)`),
    plus a few other queries (`name`, `decomposition`) used in
    corners. The current native-side approximation in
    `src/native/schema/text.rs` (`char_in_category` around :374) is
    a hand-rolled match on Rust's built-in `char::is_*` methods and
    is demonstrably wrong for most categories. Examples of current
    mis-matches:

    - `Po` (Other_Punctuation) is checked with
      `c.is_ascii_punctuation()`, so it misses every non-ASCII
      punctuation codepoint and also accepts non-`Po` ASCII
      punctuation like `_` (which is actually `Pc`) and `-`
      (actually `Pd`).
    - `Sm` (Math_Symbol) is hardcoded to `+ < = > | ~`, missing the
      entire Unicode math range.
    - `Pi`/`Pf` (Initial/Final_Punctuation), `Lt` (Titlecase_Letter),
      `Lm`/`Lo` (Modifier/Other_Letter) are all approximated with
      generic `is_alphabetic`/`is_ascii_punctuation` checks that
      don't align with the actual categories.
    - `Cs` returns false, which happens to be right for `char` but
      becomes wrong under the codepoint-vec TODO above where
      surrogates are representable.

    Plan: port enough of Python's `unicodedata` module to support the
    category queries Hypothesis actually uses, based directly on
    the authoritative data file:

      https://www.unicode.org/Public/UCD/latest/ucd/UnicodeData.txt

    - Vendor a snapshot of `UnicodeData.txt` under `src/native/`
      (or fetch it at `build.rs` time — decide based on
      reproducibility preferences). Pin the Unicode version in a
      comment.
    - Write a build-time or one-shot generator that compiles the
      file into a compact lookup table keyed by codepoint, returning
      the two-character General Category and whatever other fields
      are needed.
    - Expose a module (e.g. `src/native/unicodedata.rs`) with a small
      API: `fn general_category(cp: u32) -> GeneralCategory` plus
      grouping helpers (`is_in_group("L")` → matches `Lu|Ll|Lt|Lm|
      Lo`, etc.) to match Hypothesis's prefix-matching semantics.
    - Replace `src/native/schema/text.rs::char_in_category` with
      this, and delete the approximations.
    - Audit the Hypothesis test corpus for any other `unicodedata`
      call that lands in native mode, and port each as needed.

    Acceptance:
    - `src/native/schema/text.rs::char_in_category` is gone (or is
      a thin wrapper over the new module).
    - Category queries produce the same answer as Python's
      `unicodedata.category` for every codepoint in `0..=0x10FFFF`
      (verify with a cross-process round-trip test, or by baking a
      sample into an embedded test).
    - Hypothesis tests that filter by General Category pass in
      native mode.
