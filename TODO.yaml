    Destination: tests/hypothesis/targeting.rs

    Currently in SKIPPED.md with rationale "every test calls Hypothesis's public
    target(observation, label=...) API" — valid once target() is implemented.

    Remove test_targeting.py from SKIPPED.md when porting.

    The file tests:
    - target() accepts float observations and optional string labels
    - multiple target() calls per test case
    - label uniqueness / duplicate-label behaviour
    - target() outside a test raises an error (if Hypothesis enforces this)
    Port all tests faithfully; native-gate any that require the optimiser.

