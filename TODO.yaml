# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

  - title: Port test_optimising_all_nodes @given(nodes()) body (requires nodes() strategy + compute_max_children)
    details: |
      `tests/hypothesis/conjecture_optimiser.rs` already ports the three
      `@example` rows of upstream's `test_optimising_all_nodes` as
      independent `#[test]`s (`test_optimising_all_nodes_bytes_example`,
      `test_optimising_all_nodes_string_example`,
      `test_optimising_all_nodes_integer_example`). The `@given(nodes())`
      body is still individually-skipped — see the entry in
      `SKIPPED.md` under `conjecture/test_optimiser.py::test_optimising_all_nodes`.

      To un-skip it we need two Hypothesis primitives that have no
      hegel-rust analog yet:

      1. `nodes()` strategy (in
         `resources/hypothesis/hypothesis-python/tests/conjecture/common.py`):
         generates a random `ChoiceNode` across every choice kind
         (integer / boolean / float / bytes / string) with valid
         `constraints` dicts. Needs to be ported as a hegel strategy
         that produces `hegel::__native_test_internals::ChoiceNode`.
      2. `compute_max_children(choice_type, constraints)` (in
         `resources/hypothesis/hypothesis-python/src/hypothesis/internal/conjecture/datatree.py`):
         returns the cardinality of the choice space described by
         `(type, constraints)`. The upstream test guards on
         `compute_max_children(node.type, node.constraints) > 50`
         to skip nodes with tiny choice spaces where hill climbing
         can't produce many distinct values.

      Acceptance criteria:
        - Port `nodes()` and `compute_max_children` into hegel-rust
          (probably under `src/native/datatree.rs` and the test
          helpers module).
        - Add a `@given(nodes())`-style `#[test]` in
          `tests/hypothesis/conjecture_optimiser.rs` (or as a
          hegel-driven property test) that replaces the three fixed
          `@example` rows with a single property body.
        - Remove the corresponding individually-skipped entry from
          `SKIPPED.md` (the one at line ~1654 ending
          "Un-skipping is part of the same ... TODO that un-stubs
          `TargetedRunner`.").
