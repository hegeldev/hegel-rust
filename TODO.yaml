# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Make server float generator panic on min=0.0/max=-0.0 like native does
  details: |
    test_floats::fuzz_floats_bounds passes min_value=0.0 and max_value=-0.0
    (positive and negative zero). The native backend correctly panics with
    "no valid floats between them", matching Hypothesis's behaviour. The
    server-based backend does not panic, causing the test to fail only in
    native mode. Fix the server float generator to match the same convention.
