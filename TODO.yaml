- title: "[CI] tests/hypothesis/sampled_from.rs::test_efficient_sets_of_samples_with_chained_transformations"
  details: |
    Pre-existing failure: hashsets of sampled_from with chained
    map/filter/map hits FilterTooMuch health check. The filter
    rejects ~33% of draws, and building a 33-element hashset from 50
    candidates requires many draws. Individual element generation
    works (enumerate_values fallback), but the cumulative filter
    rejections across the collection exceed the health check threshold.

    Root cause: hegel-rust lacks Hypothesis's FilteredStrategy
    optimization that pre-computes which elements satisfy a filter
    for sampled_from. The enumerate_values fallback helps per-element
    but the collection builder still accumulates filter rejections.

