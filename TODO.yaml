- title: Remove CURRENT_NATIVE_TC thread-local; pass TestCase explicitly
  details: |
    src/native/mod.rs has a thread-local `CURRENT_NATIVE_TC` that holds a raw
    pointer to the current `NativeTestCase`. This is a design smell: test-case
    state should be passed through the call stack explicitly, not smuggled via a
    global. The thread-local was introduced as a shortcut so that inner draw
    operations could find the test case without changing every function signature,
    but the right fix is to refactor those signatures.

    Concretely:
    - Remove `CURRENT_NATIVE_TC` from src/native/mod.rs.
    - Wherever `with_native_tc(|tc| ...)` is called to access the test case,
      thread the `NativeTestCase` (or a `&mut TestCase`) down through the call
      chain instead.
    - The `target()` method being added to `TestCase` (see "Expose target() in
      the public hegel API") should pass the score through explicitly too â€” no
      new thread-locals.

    Acceptance criteria:
    - `CURRENT_NATIVE_TC` and `with_native_tc` are removed from the codebase.
    - All previously thread-local accesses are replaced by explicit parameters.
    - All tests continue to pass.

- title: Expose target() in the public hegel API
  details: |
    The native engine already has full target_observations infrastructure
    (src/native/optimiser.rs: TargetedRunner, TargetedTestCase.target_observations,
    src/native/conjecture_runner.rs). The server backend communicates scores via the
    protocol. But hegel-rust's public API exposes no way for test authors to call
    tc.target(score, label).

    Hypothesis's public API is:
      from hypothesis import target
      target(observation: float, label: str = "")  # call inside @given body

    In hegel-rust, `draw()`, `assume()`, `note()`, and `reject()` are all *methods on
    `TestCase`*, NOT free functions. `target()` must follow the same pattern:
      impl TestCase {
          pub fn target(&self, score: f64, label: impl Into<String>)
      }
    called as `tc.target(score, "label")` inside the test closure.
    Do NOT implement it as a free function `hegel::target(score, label)`.

    `TestCase` is defined in src/test_case.rs. `assume()` is at ~line 334 and
    `note()` at ~line 379 â€” use them as implementation templates.

    Implementation sketch:
    - Add `pub fn target(&self, score: f64, label: impl Into<String>)` to `TestCase`
      in src/test_case.rs, alongside `assume()` and `note()`.
    - For the server backend: check what protocol message Hypothesis uses for
      target_observations and send it on the current SharedState stream.
    - For the native backend: the test case is accessed via `CURRENT_NATIVE_TC`
      thread-local in src/native/mod.rs (not TEST_CASE_DATA â€” that doesn't exist).
      Update the `TargetedTestCase`'s `target_observations: HashMap<String, f64>` map.

    Acceptance criteria:
    - `tc.target(score, "label")` compiles and can be called inside a test closure.
    - tests/hypothesis/test_targeting.rs ports and passes in both server and native mode.

