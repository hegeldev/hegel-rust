# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

  - title: Un-skip test_optimising_all_nodes @given(nodes()) body — needs nodes() ChoiceKind strategy + hegel-driven test
    details: |
      `compute_max_children` is now ported (see `src/native/datatree.rs`),
      so half of the prerequisite for un-skipping this test is in place.
      The remaining work is the `nodes()` strategy and the test itself.

      The three `@example` rows of upstream's `test_optimising_all_nodes`
      are already ported as independent `#[test]`s in
      `tests/hypothesis/conjecture_optimiser.rs`
      (`test_optimising_all_nodes_bytes_example`,
      `test_optimising_all_nodes_string_example`,
      `test_optimising_all_nodes_integer_example`). The `@given(nodes())`
      body is still individually-skipped — see `SKIPPED.md` under
      `conjecture/test_optimiser.py::test_optimising_all_nodes`.

      Acceptance criteria:
        - Port the `nodes()` strategy from upstream
          `hypothesis-python/tests/conjecture/common.py`. In hegel this
          naturally shapes up as a hegel generator (or composite) that
          produces a `ChoiceKind` plus a concrete seed value — hegel's
          native `ChoiceKind` is a simpler, concrete representation than
          upstream's `(choice_type, constraints dict)` pair, so the port
          can produce `ChoiceKind` directly rather than opaque dicts.
          The `constraints_strategy` / `integer_constraints` /
          `boolean_constraints` / `float_constraints` /
          `bytes_constraints` / `string_constraints` building blocks
          from `provider_conformance.py` translate into the per-kind
          generators that feed into the combined `nodes()` strategy.
        - Add a `@given(nodes())`-style `#[hegel::test]` in
          `tests/hypothesis/conjecture_optimiser.rs` (native-gated) that
          replaces the three fixed `@example` rows with a single body:
            * draw a `ChoiceKind` + seed value via the `nodes()` strategy,
            * `tc.assume(compute_max_children(&kind) > 50.into())`
              (using `hegel::__native_test_internals::compute_max_children`,
              already exported),
            * build a `TargetedRunner` whose callback does
              `draw_<kind>(...)` and observes size per upstream's
              `size_function`, run `optimise_targets`.
        - Remove the corresponding individually-skipped entry from
          `SKIPPED.md` (the one at line ~1654 ending
          "Un-skipping is part of the same ... TODO that un-stubs
          `TargetedRunner`."). Update any cross-reference lines in the
          SKIPPED.md entry that still mention "neither is ported".
