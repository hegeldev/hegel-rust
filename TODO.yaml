    via accessor methods. Add a `MAX_DEPTH` constant matching
    Hypothesis's recursion-depth limit and trip `Status::Invalid` when
    nested `.map`/`.flat_map` strategies exceed it.

    This is a substantial native-engine expansion; split into smaller
    commits if the PR feels too large. The natural split is
    (1) Span tree fields + draw-by-strategy auto-span recording,
    (2) Spans newtype with index semantics,
    (3) MAX_DEPTH enforcement.

    Acceptance criteria:
