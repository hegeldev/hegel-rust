- title: Port conjecture/test_engine.py::test_debug_data
  details: |
    Port `test_debug_data` from
    `resources/hypothesis/hypothesis-python/tests/conjecture/test_engine.py`.
    Upstream uses `capsys` to capture stdout and assert on
    `Verbosity.debug` diagnostic output from a
    `ConjectureRunner.run()` call.

    Port path: use `TempRustProject` (see `tests/test_output.rs` and
    `tests/test_draw_named.rs`) to run a test with
    `Verbosity::Debug` in a subprocess and capture stderr, then
    assert on the expected diagnostic lines. The
    `NativeConjectureRunner` wrapper doesn't need additional stubs
    for this — the existing `native_run` debug output already covers
    the content. This test may end up native-gated or not depending
    on whether the `TempRustProject` path works on both backends.

    Acceptance criteria:
      - `test_debug_data` compiles and passes.
      - The `::test_debug_data` bullet in `SKIPPED.md` is removed.

- title: Port conjecture/test_engine.py::test_mildly_complicated_strategies LargeFlag row
  details: |
    The `st.sampled_from(enum.Flag("LargeFlag", ...))` row of
    `test_mildly_complicated_strategies` in
    `resources/hypothesis/hypothesis-python/tests/conjecture/test_engine.py`
    is currently skipped because Python's `enum.Flag` has no direct
    Rust analog. Build a small local bitflags-style type (e.g. via
    the `bitflags!` crate already in use, or a plain `#[derive(Clone,
    Copy)] struct LargeFlag(u64)`) with 64 distinct flag values, wrap
    it in `gs::sampled_from(all_flag_combinations)`, and port the
    `minimal(gen, |f| bit_count(f.value) > 1)` shape. No new native
    wrapper functionality needed.

    Acceptance criteria:
      - The port compiles and passes under
        `cargo test --test hypothesis conjecture_engine::`.
      - The `::test_mildly_complicated_strategies` (LargeFlag row)
        bullet in `SKIPPED.md` is removed.
