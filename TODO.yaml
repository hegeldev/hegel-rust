# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Port InMemoryNativeDatabase (match Hypothesis's InMemoryExampleDatabase)
  details: |
    Follow-up to the multi-value `NativeDatabase` rework.
    `resources/hypothesis/hypothesis-python/src/hypothesis/database.py`
    ships `InMemoryExampleDatabase`, a non-persistent sibling of the
    directory-backed database that keeps `data: dict[bytes, set[bytes]]`
    in memory. hegel-rust has no in-memory counterpart.

    Scope:
    1. Decide on a shared trait. The cleanest structure is probably
       an `ExampleDatabase` trait in `src/native/database.rs` with
       `save`/`fetch`/`delete`/`move_value` methods; `NativeDatabase`
       (the directory-backed one) and a new
       `InMemoryNativeDatabase` both implement it. The runner's
       `db: Option<NativeDatabase>` becomes
       `db: Option<Box<dyn ExampleDatabase>>` (or equivalent).
    2. Implement `InMemoryNativeDatabase` using
       `HashMap<Vec<u8>, HashSet<Vec<u8>>>`.
    3. Port the in-memory subset of
       `tests/cover/test_database_backend.py`
       (`test_backend_returns_what_you_put_in`, `test_can_delete_keys`,
       parametrized `exampledatabase` fixture tests) as native-only
       integration tests. Remove the corresponding sub-bullets from
       the `test_database_backend.py` entry in SKIPPED.md.
    4. The public-facing `Database::Path(p)` enum in
       `src/runner.rs` may need a new `Database::InMemory` variant —
       see the `Database` / `Settings` surface before adding it to
       keep the server/native split clean.

    Acceptance:
    - An `InMemoryNativeDatabase` type exists with the same
      multi-value semantics as `NativeDatabase`.
    - The replay test suite passes in both directory and in-memory
      modes.
    - `test_database_backend.py` entry in SKIPPED.md lists one
      fewer sub-bullet of un-ported functionality.

- title: Port ReadOnlyDatabase / MultiplexedDatabase / BackgroundWriteDatabase wrappers
  details: |
    Follow-up to the multi-value `NativeDatabase` rework.
    `hypothesis.database` exports three wrapper classes that compose
    databases together: `ReadOnlyDatabase` (silently drops writes),
    `MultiplexedDatabase` (reads union, writes fan out),
    `BackgroundWriteDatabase` (flushes writes on a worker thread). All
    three rely on the base-class `save`/`fetch`/`delete`/`move` API
    that `NativeDatabase` now exposes, so they are unblocked by the
    multi-value rework. None exist in Rust yet.

    Prerequisite: the `ExampleDatabase` trait from the
    `InMemoryNativeDatabase` TODO above (this work is much cleaner on
    top of that trait).

    Scope:
    1. `ReadOnlyNativeDatabase<D>` that forwards `fetch` to its inner
       database and silently ignores `save` / `delete` /
       `move_value`. Ports `test_readonly_db_is_not_writable`.
    2. `MultiplexedNativeDatabase` holding a `Vec<Box<dyn
       ExampleDatabase>>`. `save` / `delete` / `move_value` fan out;
       `fetch` unions results and de-duplicates. Ports
       `test_multiplexed_dbs_read_and_write_all`.
    3. `BackgroundWriteNativeDatabase` that buffers writes to a
       worker thread. Careful with shutdown semantics (matching
       Hypothesis's `__del__`-style flush). Ports
       `test_background_write_database`.
    4. Each wrapper gets its own `tests/embedded/native/` or
       `tests/native/` test file; remove the corresponding
       sub-bullets from the `test_database_backend.py` entry in
       SKIPPED.md.

    Acceptance:
    - All three wrapper types exist and round-trip data via the
      `ExampleDatabase` trait.
    - Corresponding sub-bullets removed from SKIPPED.md.

- title: Port the ExampleDatabase listener API (add_listener / remove_listener)
  details: |
    Follow-up to the multi-value `NativeDatabase` rework.
    Hypothesis's base `ExampleDatabase` class exposes
    `add_listener` / `remove_listener` / `clear_listeners` and an
    internal `_broadcast_change` helper that fires `("save", (k, v))`
    / `("delete", (k, v))` events whenever the underlying store
    changes (see `database.py`). On `DirectoryBasedExampleDatabase`
    this hooks into watchdog so that external writers to the same
    directory are also observed. Hegel-rust has no listener surface.

    Scope:
    1. Design the Rust listener API. Likely a `Fn(ListenerEvent)`
       closure stored alongside the database, where `ListenerEvent`
       is an enum `Save { key, value } | Delete { key, value: Option<...> }`.
    2. Wire events into `save` / `delete` / `move_value` on
       `NativeDatabase` and `InMemoryNativeDatabase` (once that
       lands). Whether to port the watchdog integration for
       cross-process observation is a separate design question —
       watchdog is Python-specific, but the `notify` crate is the
       Rust analogue.
    3. Port the `_database_conforms_to_listener_api` state-machine
       test and the `test_add_listener_*` tests. The state-machine
       test uses Hypothesis's `RuleBasedStateMachine`; hegel-rust's
       stateful support lives in `src/stateful.rs` — check fit
       before starting. If stateful support is insufficient, file a
       narrower follow-up for that first.
    4. Update the `test_database_backend.py` SKIPPED.md sub-bullet.

    Acceptance:
    - `NativeDatabase` supports registering listeners that fire on
      save/delete/move_value.
    - The Hypothesis listener-API test suite passes against
      `NativeDatabase` and `InMemoryNativeDatabase`.

- title: Audit SKIPPED.md for entries miscategorised under the skip policy
  details: |
    `.claude/skills/porting-tests/SKILL.md` tightened the skip policy:
    "no Rust counterpart" is NOT a valid skip rationale for
    engine-internal gaps — those should be native-gated + stubbed.
    Only public-API incompatibilities (Python facilities, external
    library integrations) justify a skip.

    The `test_database_backend.py` entry at SKIPPED.md:121 is the
    known example — skipped on "this API doesn't exist" grounds,
    which is the anti-pattern the policy now forbids. The
    multi-value-database TODO above fixes that specific entry, but
    the same miscategorisation may apply elsewhere in SKIPPED.md.

    Go through every entry in SKIPPED.md (both `## pbtkit` and
    `## hypothesis` sections) and classify each one:
    - Public-API incompatibility (Python-only facility, external
      library dep, missing user-facing Rust type) — keep the skip,
      but tighten the rationale to say that explicitly.
    - Engine-internal gap (native feature missing, internal API
      has no counterpart, "already covered elsewhere", "redundant")
      — remove from SKIPPED.md and either:
        a) port the tests with the missing pieces native-gated +
           stubbed under `src/native/`, or
        b) file a focused TODO entry for the port and remove the
           SKIPPED.md entry in the same commit so it doesn't
           linger as an accidental gate.

    This is a survey + one-or-more follow-up TODOs task; if the
    audit turns up N mis-skips, it's fine to replace this TODO
    with N narrower port-or-port-plan TODOs rather than doing them
    all at once.

    Acceptance:
    - Every SKIPPED.md entry states a rationale that matches the
      current skip policy (public-API incompatibility only).
    - Any mis-skipped files are either ported or have explicit
      TODO entries tracking them.
    - Commit message (or PR description if multiple commits) lists
      which entries were re-examined and what happened to each.
