# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

  - title: "[CI] check release: RELEASE.md already exists on main (human intervention required)"
    details: |
      Failing workflow job: "check release" / "Check release"
      Command: python .github/scripts/release.py check "$BASE_REF" (BASE_REF=main)

      Log extract:
        Traceback (most recent call last):
          File "/home/runner/work/hegel-rust/hegel-rust/.github/scripts/release.py", line 256, in <module>
            check(args.base_ref)
          File "/home/runner/work/hegel-rust/hegel-rust/.github/scripts/release.py", line 103, in check
            raise ValueError(
        ValueError: RELEASE.md already exists on main. It's possible the CI job
        responsible for cutting a new release is in progress, or has failed.
        ##[error]Process completed with exit code 1.

      NOTE: This exact failure was already triaged on this PR and the TODO was
      then removed (commit a050103 "Remove TODO for check-release failure
      (human intervention required)"). The root cause is state on the `main`
