    Acceptance criteria:
      - All 5 tests compile and pass.
      - The matching bullet in `SKIPPED.md` is removed.

- title: Port conjecture/test_engine.py remaining bookkeeping tests
  details: |
    Port the following tests from `conjecture/test_engine.py` into
    `tests/hypothesis/conjecture_engine.rs`, native-gated. Each needs
    a small engine-side facility not covered by the other follow-up
    clusters:
      - `test_can_navigate_to_a_valid_example` — uses
        `buffer_size_limit(4)` as a context manager around
        `runner.run()` to cap a single test case's total byte draws.
        Port path: add a per-runner override on
        `NativeRunnerSettings` / `NativeConjectureData` that caps
        `draw_bytes` to a configurable total rather than the fixed
        `CONJECTURE_BUFFER_SIZE`.
      - `test_stops_after_max_examples_when_generating_more_bugs`
        (parametrized on `examples ∈ {1, 5, 20, 50}`) — the test
        function `raise`s arbitrary Python exceptions; Hypothesis
        catches them and records each distinct traceback as an
        interesting example. Port path: wrap the test function in
        `catch_unwind`; map non-MarkPanic / non-STOP_TEST_PANIC
        payloads to `Status::Interesting` with a per-panic
        `InterestingOrigin` derived from the panic payload's type-id
        or downcast string.

    Acceptance criteria:
      - Both tests (1 + 4 parametrized rows) compile and pass.
      - The matching bullet in `SKIPPED.md` is removed.

- title: Port conjecture/test_engine.py monkeypatch cluster
  details: |
    Port the following tests from `conjecture/test_engine.py`,
    native-gated. Each uses `monkeypatch.setattr(ConjectureRunner,
    "generate_new_examples", ...)` to seed a specific initial buffer
    or `monkeypatch.setattr(engine_module, "MAX_SHRINKS"|"CACHE_SIZE",
    n)` to cap the shrink/cache loop:
      - `test_terminates_shrinks`
      - `test_shrinks_both_interesting_examples`
      - `test_discarding`
      - `test_shrinking_from_mostly_zero`
      - `test_handles_nesting_of_discard_correctly`
      - `test_prefix_cannot_exceed_buffer_size`
      - `test_will_evict_entries_from_the_cache`
      - `test_simulate_to_evicted_data`

    Port path: call `runner.cached_test_function(seed_choices)`
    explicitly before `runner.run()` to seed the initial buffer; use
    `NativeRunnerSettings::max_shrinks(n)` for the MAX_SHRINKS
    override. Extend `NativeRunnerSettings` with a `cache_size(n)`
    override if needed by `test_will_evict_entries_from_the_cache`;
    don't add Python-style attribute injection.

    Acceptance criteria:
      - All 8 tests compile and pass under
        `cargo test --features native --test hypothesis conjecture_engine::`.
      - The `::test_terminates_shrinks` through
        `::test_simulate_to_evicted_data` bullet in `SKIPPED.md` is
        removed.

- title: Port conjecture/test_engine.py FailedHealthCheck cluster
  details: |
    Port the following tests from `conjecture/test_engine.py`,
    native-gated. Each wraps a `ConjectureRunner.run()` in
    `pytest.raises(FailedHealthCheck)` and asserts
    `str(HealthCheck.xxx) in str(e.value)`:
      - `test_fails_health_check_for_all_invalid`
      - `test_fails_health_check_for_large_base`
      - `test_fails_health_check_for_large_non_base`
      - `test_fails_health_check_for_slow_draws`
      - `test_health_check_too_slow_with_invalid_examples`
      - `test_health_check_too_slow_with_overrun_examples`
      - `test_too_slow_report`

    Port path: use the
    `hegel::__native_test_internals::fails_health_check(label, build)`
    free function (stub in `src/native/conjecture_runner.rs`) — fill
    it in to `catch_unwind` the build+run and assert the panic
    payload's string matches a per-label panic prefix. The native
    engine's `panic!("FailedHealthCheck: TooSlow …")` / `"…
    FilterTooMuch …"` strings already exist in
    `src/native/runner.rs`; extend them to cover
    `LargeBaseExample` / `DataTooLarge` as the tests require.

    Acceptance criteria:
      - All 7 tests compile and pass under
        `cargo test --features native --test hypothesis conjecture_engine::`.
      - The `::test_fails_health_check_for_all_invalid` through
        `::test_too_slow_report` bullet in `SKIPPED.md` is removed.

