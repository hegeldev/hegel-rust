# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

  - title: '[CI] check release fails because RELEASE.md already exists on main'
    details: |
      `check release` job fails:

        Traceback (most recent call last):
          File ".../.github/scripts/release.py", line 256, in <module>
            check(args.base_ref)
          File ".../.github/scripts/release.py", line 103, in check
            raise ValueError(
        ValueError: RELEASE.md already exists on main. It's possible the
        CI job responsible for cutting a new release is in progress, or
        has failed.

      Failing command: `python .github/scripts/release.py check "$BASE_REF"`
      with BASE_REF=main. Investigate whether the release job stalled
      mid-cut or if RELEASE.md needs to be cleaned up on main; this is
      likely an infra/release-pipeline issue rather than a code change
      on this branch. May resolve on its own once the release job
      finishes; if not, the release pipeline needs unsticking.

  - title: Implement `mutate_and_shrink` in src/native/shrinker/
    details: |
      Port pbtkit's `shrinking/mutation.py` (92 lines) to
      `src/native/shrinker/mutation.rs` and call from
      `Shrinker::shrink()` as a last-resort pass (results > 32 nodes are
      skipped per the upstream).

      Needs `TestCase`-style probe machinery that fills a prefix then draws
      random continuations. The native backend's data_source has equivalent
      primitives.

      Acceptance: remove the `#[cfg(not(feature = "native"))]` gates from:
        - tests/pbtkit/shrink_quality_composite.rs::test_one_of_switches_to_shorter_branch
        - tests/pbtkit/shrink_quality_composite.rs::test_one_of_shorter_branch_needs_non_simplest_value
      ... and they pass in `cargo test --features native --test pbtkit`.

      Note: `test_one_of_shorter_branch_needs_non_simplest_value` passes
      in pbtkit only because `Random(0)` happens to seed the shrinker
      with `Bool(true)` directly; with a different seed pbtkit would
      also need `mutate_and_shrink` to cross the one_of branch. See the
      comment on that test in the source file.
