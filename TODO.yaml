# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Port conjecture/test_engine.py ExitReason cluster
  details: |
    Port the following tests from `conjecture/test_engine.py` into
    `tests/hypothesis/conjecture_engine.rs`, native-gated. Each asserts
    on `runner.exit_reason` values that the current
    `NativeConjectureRunner::run()` doesn't set — it unconditionally
    exits with `ExitReason::Finished`:
      - `test_detects_flakiness`
      - `test_recursion_error_is_not_flaky`
      - `test_exit_because_max_iterations`
      - `test_max_iterations_with_all_invalid`
      - `test_max_iterations_with_some_valid`
      - `test_exit_because_shrink_phase_timeout`

    Port path: extend `NativeConjectureRunner::run()` to set
    `exit_reason = Flaky` on a re-run mismatch (for
    `test_detects_flakiness`), `MaxIterations` when the invalid-run
    budget trips, and `VerySlowShrinking` + `statistics` on the
    shrink-phase wall-clock budget trip. `INVALID_THRESHOLD_BASE` /
    `INVALID_PER_VALID` constants need to mirror Hypothesis's
    engine.py defaults (the `test_max_iterations_with_*` tests
    assert the exact call count). `test_recursion_error_is_not_flaky`
    is likely skip-worthy (Python-only stack trickery) — add a
    SKIPPED.md entry if so.

    Acceptance criteria:
      - All 6 tests compile and pass (or `test_recursion_error_is_not_flaky`
        is added to SKIPPED.md with a rationale naming CPython's stack
        tricks).
      - The matching bullet in `SKIPPED.md` is removed.

- title: Port conjecture/test_engine.py database-replay cluster
  details: |
    Port the following tests from `conjecture/test_engine.py` into
    `tests/hypothesis/conjecture_engine.rs`, native-gated. Each relies
    on Hypothesis's `InMemoryExampleDatabase` plus the runner's
    corpus-replay phase (`reuse_existing_examples` / `save_choices`):
      - `test_can_load_data_from_a_corpus`
      - `test_stops_after_max_examples_when_reading`
      - `test_reuse_phase_runs_for_max_examples_if_generation_is_disabled`
      - `test_runs_full_set_of_examples`
      - `test_does_not_save_on_interrupt`
      - `test_saves_on_skip_exceptions_to_reraise`

    Port path: use `InMemoryNativeDatabase` as the DB; implement
    `NativeConjectureRunner`'s reuse phase so it reads entries via
    `ExampleDatabase::fetch(key)` and replays them as seeded test
    runs before the generation phase. `test_does_not_save_on_interrupt`
    and `test_saves_on_skip_exceptions_to_reraise` may be skip-worthy
    (Python-specific `KeyboardInterrupt` / `pytest.skip()`) — add
    SKIPPED.md entries if so.

    Acceptance criteria:
      - All 6 tests compile and pass (or any Python-specific
        exceptions tests are added to SKIPPED.md with a rationale).
      - The matching bullet in `SKIPPED.md` is removed.

- title: Port conjecture/test_engine.py multiple-bugs / shrink-entry cluster
  details: |
    Port the following tests from `conjecture/test_engine.py` into
    `tests/hypothesis/conjecture_engine.rs`, native-gated. Each relies
    on `report_multiple_bugs=False` behaviour, the standalone
    `runner.shrink_interesting_examples()` entry point, or
    cached-test-function replay:
      - `test_does_not_shrink_multiple_bugs_when_told_not_to`
      - `test_does_not_keep_generating_when_multiple_bugs`
      - `test_shrink_after_max_examples`
      - `test_shrink_after_max_iterations`
      - `test_stops_if_hits_interesting_early_and_only_want_one_bug`

    Port path: extend `NativeRunnerSettings` with
    `report_multiple_bugs: bool` (default `true`); fill in
    `NativeConjectureRunner::shrink_interesting_examples()` to run
    only the shrink phase on the current `interesting_examples`; wire
    `NativeConjectureRunner::cached_test_function(choices)` to replay
    a seeded test case. The upstream `Mock(...)` on
    `shrink_interesting_examples` in `test_shrink_after_max_*` ports
    as a boolean flag captured inside a wrapped closure.

    Acceptance criteria:
      - All 5 tests compile and pass.
      - The matching bullet in `SKIPPED.md` is removed.

- title: Port conjecture/test_engine.py save_choices / secondary_key / pareto_key cluster
  details: |
    Port the following tests from `conjecture/test_engine.py` into
    `tests/hypothesis/conjecture_engine.rs`, native-gated. Each uses
    `runner.save_choices(...)` / `runner.secondary_key` /
    `runner.pareto_key` / `runner.reuse_existing_examples()` /
    `runner.clear_secondary_key()`, all currently `todo!()` stubs:
      - `test_does_not_shrink_if_replaying_from_database`
      - `test_does_shrink_if_replaying_inexact_from_database`
      - `test_skips_secondary_if_interesting_is_found`
      - `test_discards_invalid_db_entries`
      - `test_discards_invalid_db_entries_pareto`

    Port path: fill in `NativeConjectureRunner::{save_choices,
    secondary_key, pareto_key, reuse_existing_examples,
    clear_secondary_key}` per Hypothesis's `engine.py`. Use the
    already-exported `InMemoryNativeDatabase` / `choices_to_bytes`
