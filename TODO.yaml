  - title: Implement native targeting/optimiser (target_observations, optimise_targets, best_observed_targets)
    details: |
      Hypothesis's targeted property-based testing lets a test body record
      a floating-point "target score" under a named key
      (`data.target_observations["m"] = value`). After the generation
      phase, `ConjectureRunner.optimise_targets()` runs a hill-climbing
      pass that mutates choice values to drive those targets higher,
      recording the cross-test-case best under `best_observed_targets`.
      See `hypothesis-python/src/hypothesis/internal/conjecture/optimiser.py`
      for the pass and `tests/conjecture/test_optimiser.py` for the
      behavioural contract.

      hegel-rust's native engine has none of this. `src/native/optimiser.rs`
      currently holds a stub `TargetedRunner` / `TargetedTestCase` surface
      with every method `todo!()` so that
      `tests/hypothesis/conjecture_optimiser.rs` compiles in both modes.
      The ported tests panic at runtime on the first `TargetedRunner::new`
      call; implementing this TODO is what makes them pass.

      - `NativeTestCase` (in `src/native/core/state.rs`) has no
        `target_observations` field and no `observe_target` accessor.
      - `CachedTestFunction` (in `src/native/tree.rs`) does not surface
        per-test-case target observations through its `run` /
        `run_shrink` / `run_probe` return values.
      - `src/native/runner.rs::native_run` has no post-generation
        optimiser loop; there is no equivalent of Hypothesis's `Optimiser`
        class.

      A minimal port is probably:

      1. Add `target_observations: HashMap<String, f64>` to
         `NativeTestCase` plus an `observe_target(&mut self, key: &str,
         value: f64)` method.
      2. Surface target observations through `CachedTestFunction`'s
         execute path (alongside `nodes` and `spans`) so a runner can
         read them after each call.
      3. Port Hypothesis's `Optimiser` (single-target hill climber over
         integer / boolean / float / bytes / string choices) into
         `src/native/optimiser.rs`, replacing the current stubs.
         Iterate across target keys to cover the multi-target case.
      4. Wire `TargetedRunner` (in `src/native/optimiser.rs`) to drive
         generation + optimise + shrink against a user-supplied test
         function, matching the surface already consumed by
         `tests/hypothesis/conjecture_optimiser.rs`.
      5. Back `BufferSizeLimit` with an actual thread-local override of
         `native::core::BUFFER_SIZE` (currently `todo!()`).

      The matching pbtkit file `test_targeting.py` is also whole-file
      skipped ("no targeting surface on hegel-rust's `TestCase`"); the
      same implementation will likely unblock both.

      Acceptance criteria:
        - Replace the `todo!()` bodies in `src/native/optimiser.rs` with a
          working `TargetedRunner` / `TargetedTestCase` / `BufferSizeLimit`.
        - All 17 ported `tests/hypothesis/conjecture_optimiser.rs` tests
          pass in `cargo test --features native --test hypothesis
          conjecture_optimiser`.
        - Port the upstream `test_optimising_all_nodes` `@given(nodes())`
          body and remove the corresponding individually-skipped entry
          from `SKIPPED.md` (requires porting the `nodes()` strategy and
          `compute_max_children` from
          `hypothesis.internal.conjecture.datatree`).
