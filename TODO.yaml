- title: Expose NativeConjectureData::for_choices + mark_* via __native_test_internals
  details: |
    Port `test_can_mark_interesting`, `test_can_mark_invalid`, and
    `test_can_mark_invalid_with_why` from
    `conjecture/test_test_data.py`. All three need to construct a
    `NativeConjectureData` from a fixed choice prefix and then call
    `mark_interesting(origin)` or `mark_invalid()` (with optional
    "why") on the test case.

    Port path: `NativeConjectureData::new(ntc, buffer_size_limit)` is
    private in `src/native/conjecture_runner.rs`. Add a public
    `pub fn for_choices(choices: &[ChoiceValue]) -> Self` that wraps
    `NativeTestCase::for_choices(choices, None)` with the default
    `CONJECTURE_BUFFER_SIZE`. Extend `mark_invalid` to accept an
    optional `why: Option<String>` and stash it on the data so a
    new `pub fn events(&self) -> &HashMap<String, String>` accessor
    can mirror Hypothesis's `data.events == {"invalid because": why}`.
    The test catches the `MarkPanic` payload via
    `std::panic::catch_unwind` plus `AssertUnwindSafe`.

    Acceptance criteria:
      - `test_can_mark_interesting`, `test_can_mark_invalid`, and
        `test_can_mark_invalid_with_why` compile and pass under
        `cargo test --features native --test hypothesis
        conjecture_test_data::`.
      - The matching bullets in `SKIPPED.md` are removed.

- title: Add NativeTestCase draw-by-strategy + span tree surface
  details: |
    Port the strategy-driven span-introspection cluster from
    `conjecture/test_test_data.py`:
      - `test_examples_show_up_as_discarded`
      - `test_can_override_label`
      - `test_examples_support_negative_indexing`
      - `test_examples_out_of_bounds_index`
      - `test_child_indices`
      - `test_example_equality`
      - `test_example_depth_marking`
      - `test_has_examples_even_when_empty`
      - `test_has_cached_examples_even_when_overrun`
      - `test_closes_interval_on_error_in_strategy`
      - `test_does_not_double_freeze_in_interval_close`
      - `test_will_mark_too_deep_examples_as_invalid` (bundled — also
        needs `MAX_DEPTH`)

    Port path: add `pub fn draw<G: Generator<T>, T>(&mut self, g: G)
    -> T` on `NativeTestCase` (or on a higher-level data wrapper) that
    auto-records a span around each draw and closes open spans on
    panic. Extend `Span` (in `src/native/core/state.rs`) with
    `parent: Option<usize>`, `children: Vec<usize>`, `depth: u32`,
    `choice_count: usize`, and `discarded: bool` fields, and replace
    `pub spans: Vec<Span>` with a `Spans` newtype that supports
    Python-style negative indexing and out-of-bounds error semantics
    via accessor methods. Add a `MAX_DEPTH` constant matching
    Hypothesis's recursion-depth limit and trip `Status::Invalid` when
    nested `.map`/`.flat_map` strategies exceed it.

    This is a substantial native-engine expansion; split into smaller
    commits if the PR feels too large. The natural split is
    (1) Span tree fields + draw-by-strategy auto-span recording,
    (2) Spans newtype with index semantics,
    (3) MAX_DEPTH enforcement.

    Acceptance criteria:
      - All 12 tests compile and pass under
        `cargo test --features native --test hypothesis
        conjecture_test_data::`.
      - The matching bullets in `SKIPPED.md` are removed.

- title: Add NativeTestCase DataObserver hook
  details: |
    Port `test_can_observe_draws` and `test_calls_concluded_implicitly`
    from `conjecture/test_test_data.py`. The first installs a
    `LoggingObserver(DataObserver)` on `ConjectureData.for_choices` and
    asserts that `draw_boolean`, `draw_integer`, and `conclude_test`
    callbacks fire in order with the expected
    `(value, was_forced, constraints)` / `(status, origin)` payloads.
    The second asserts that calling `freeze()` invokes
    `conclude_test(Status::Valid, None)` on the registered observer.

    Port path: add a `DataObserver` trait under
    `src/native/core/state.rs` with `draw_boolean`, `draw_integer`,
    `draw_float`, `draw_bytes`, `draw_string`, and `conclude_test`
    methods (all default-no-op). Thread an
    `Option<Box<dyn DataObserver>>` field through `NativeTestCase`,
    populated by an extra constructor parameter on
    `for_choices`. Each draw method calls the observer hook after
    appending the choice node; the existing `freeze()` (in
    `src/native/core/state.rs`) calls `conclude_test` with the
    finalised `(status, interesting_origin)` after promoting `status`
    to `Status::Valid`.

    Acceptance criteria:
      - `test_can_observe_draws` and `test_calls_concluded_implicitly`
        compile and pass under
        `cargo test --features native --test hypothesis
        conjecture_test_data::`.
      - The matching bullets in `SKIPPED.md` are removed.

