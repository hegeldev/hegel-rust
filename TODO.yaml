# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     blocked_by:           # optional; list of titles that must be cleared
#       - Other entry title #   first. Blocked entries are kept in the queue
#                           #   but skipped by the dispatcher until every
#                           #   listed blocker is removed from TODO.yaml.
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Port conjecture/test_engine.py::test_handles_nesting_of_discard_correctly
  blocked_by:
    - Port conjecture/test_engine.py new_shrinker cluster
  details: |
    Port `test_handles_nesting_of_discard_correctly` from
    `conjecture/test_engine.py`.  Upstream uses
    `monkeypatch.setattr(Shrinker, "shrink", Shrinker.remove_discarded)`
    to constrain the shrink loop to a single named pass — without that
    constraint the native full-shrinker finds the lex-smaller
    `(True, False)` minimum rather than the upstream-asserted
    `(True, True)`, because the discarded-span boundary information
    isn't tracked along the choice sequence.

    Port path: extend `Span` with a `discarded: bool` field and
    propagate it through `NativeConjectureData::stop_span_with_discard`
    into the shrinker's view of the test case (the existing
    `NativeTestCase.has_discards` flag is enough at the data level;
    the shrinker callback needs to see per-span discarded state too).
    Add a `remove_discarded` shrink pass to `src/native/shrinker/mod.rs`
    that mirrors `internal/conjecture/shrinker.py::remove_discarded`:
    collect non-overlapping discarded spans, delete their choice
    ranges in reverse, and `consider` the result.  Then either expose
    a way to run only that pass (e.g. via `NativeShrinker::fixate_shrink_passes`,
    coming with the new_shrinker cluster) or seed via
    `cached_test_function` plus an additional explicit
    `runner.shrinker_remove_discarded()` driver — pick whichever
    matches the new_shrinker port best so the two land coherently.

    Acceptance criteria:
      - `test_handles_nesting_of_discard_correctly` compiles and
        passes under `cargo test --features native --test hypothesis
        conjecture_engine::`.
      - The matching bullet in `SKIPPED.md` is updated to drop this
        test from the still-skipped list.

- title: Port conjecture/test_engine.py new_shrinker cluster
  details: |
    Port the following tests from `conjecture/test_engine.py`,
    native-gated. Each seeds an initial buffer via
    `runner.cached_test_function(start)` then builds
    `runner.new_shrinker(last_data, lambda d: d.status == INTERESTING)`
    and drives a single named shrink pass via
    `fixate_shrink_passes([pass_name])`:
      - `test_can_remove_discarded_data`
      - `test_discarding_iterates_to_fixed_point`
      - `test_discarding_is_not_fooled_by_empty_discards`
      - `test_discarding_can_fail`
      - `test_can_write_bytes_towards_the_end`
      - `test_uniqueness_is_preserved_when_writing_at_beginning`
      - `test_dependent_block_pairs_can_lower_to_zero`
      - `test_handle_size_too_large_during_dependent_lowering`
      - `test_block_may_grow_during_lexical_shrinking`
      - `test_lower_common_node_offset_does_nothing_when_changed_blocks_are_zero`
      - `test_lower_common_node_offset_ignores_zeros`
      - `test_cached_test_function_returns_right_value`
      - `test_cached_test_function_does_not_reinvoke_on_prefix`
      - `test_branch_ending_in_write`
      - `test_exhaust_space`
      - `test_discards_kill_branches`
      - `test_number_of_examples_in_integer_range_is_bounded`
      - `test_does_not_cache_extended_prefix`
      - `test_does_cache_if_extend_is_not_used`
      - `test_does_result_for_reuse`
      - `test_does_not_use_cached_overrun_if_extending`
      - `test_uses_cached_overrun_if_not_extending`
      - `test_can_be_set_to_ignore_limits`
      - `test_overruns_with_extend_are_not_cached`

    Port path: fill in `NativeConjectureRunner::{cached_test_function,
    new_shrinker, generate_novel_prefix, tree}`, plus
    `NativeShrinker::{shrink, fixate_shrink_passes, current_nodes}`.
    Named pass strings (e.g. `"minimize_individual_blocks"`,
    `"lower_common_node_offset"`) map to entries in
    `src/native/shrinker/mod.rs`'s pass table — thread the single-pass
    entry point through rather than duplicating the full shrink loop.

    Like the runner-bookkeeping cluster this may land as several
    narrower commits; split if the set feels too large.

    Acceptance criteria:
      - All 24 tests compile and pass under
        `cargo test --features native --test hypothesis conjecture_engine::`.
      - The `::test_can_remove_discarded_data` through
        `::test_overruns_with_extend_are_not_cached` bullet in
        `SKIPPED.md` is removed.

