# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Fix test_floats::fuzz_floats_bounds pre-existing failure
  details: |
    The test panics with "no valid floats between them" when min_value=0.0 and
    max_value=-0.0 (positive and negative zero are distinct IEEE 754 values but
    compare equal). This is a pre-existing bug that blocks the standard
    (non-native) coverage check. Fix the float range logic to treat 0.0 and
    -0.0 as the same bound, or normalise the inputs before comparison.
