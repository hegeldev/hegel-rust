# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     blocked_by:           # optional; list of titles that must be cleared
#       - Other entry title #   first. Blocked entries are kept in the queue
#                           #   but skipped by the dispatcher until every
#                           #   listed blocker is removed from TODO.yaml.
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Port quality/test_discovery_ability.py
  details: |
    Upstream: resources/hypothesis/hypothesis-python/tests/quality/test_discovery_ability.py
    Destination: tests/hypothesis/quality_discovery_ability.rs

    Abandoned due to a cherry-pick conflict (TODO.yaml merge conflict during parallel
    run). No portability issue. Remove from SKIPPED.md when porting.

    ~60 statistical tests that assert generator distributions produce specific values
    with a minimum probability (e.g. "integers() produces values > 1000 at least 50%
    of the time"). The test harness uses ConjectureRunner directly, which maps to
    src/native/conjecture_runner.rs. All tests should be #[cfg(feature = "native")].
    These are important distribution-quality regression tests.

