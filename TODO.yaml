# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

- title: Un-ignore conjecture_engine::test_one_dead_branch
  details: |
    `tests/hypothesis/conjecture_engine.rs::test_one_dead_branch` is
    currently `#[ignore = "requires datatree-guided dead-branch
    avoidance"]`. Upstream's test marks `i > 0` as invalid and then
    relies on Hypothesis's `DataTree.simulate_test_function` /
    `generate_novel_prefix` to stop re-sampling the dead branch —
    without that, every random first byte has a ~255/256 chance of
    being invalid and the seen-set never grows enough to trigger
    `mark_interesting(origin)` within the default call budget.

    Two pieces of work unblock this:
      - Implement `NativeConjectureData::mark_invalid` (currently a
        `todo!()` stub in `src/native/conjecture_runner.rs`).  The
        existing `mark_interesting` path (panic-payload `MarkPanic
        { data_id }` + `Status::Interesting` arm in `run_test_fn`)
        is the template — add a mirror `MarkKind::Invalid` variant
        and Status::Invalid arm.
      - Teach `NativeConjectureRunner`'s generation phase to avoid
        the dead branch, either by seeding `NativeTestCase` with a
        novel-prefix walk over a `DataTree` (port of
        `internal/conjecture/datatree.py::DataTree.generate_novel_prefix`)
        or by observing that the first choice position has only one
        remaining-live child and forcing subsequent generation
        there.

    Then remove the `#[ignore]` attribute.

    Acceptance criteria:
      - `cargo test --features native --test hypothesis
        conjecture_engine::test_one_dead_branch` passes without
        `--ignored`.

- title: Port conjecture/test_engine.py runner-bookkeeping cluster
  details: |
    Port the following tests from `conjecture/test_engine.py` into
    `tests/hypothesis/conjecture_engine.rs`, native-gated. Each
    constructs a `ConjectureRunner(f, settings=, random=, database_key=)`,
    calls `runner.run()`, and asserts on `runner.interesting_examples`
    / `runner.exit_reason` / `runner.shrinks` / `runner.call_count` /
    `runner.valid_examples` / `runner.save_choices(...)` /
    `runner.secondary_key` / `runner.pareto_key`:
      - `test_can_load_data_from_a_corpus`
      - `test_detects_flakiness`
      - `test_recursion_error_is_not_flaky`
      - `test_can_navigate_to_a_valid_example`
      - `test_stops_after_max_examples_when_reading`
      - `test_stops_after_max_examples_when_generating`
      - `test_stops_after_max_examples_when_generating_more_bugs`
      - `test_phases_can_disable_shrinking`
      - `test_reuse_phase_runs_for_max_examples_if_generation_is_disabled`
      - `test_does_not_save_on_interrupt`
      - `test_saves_on_skip_exceptions_to_reraise`
      - `test_exit_because_max_iterations`
      - `test_max_iterations_with_all_invalid`
      - `test_max_iterations_with_some_valid`
      - `test_exit_because_shrink_phase_timeout`
      - `test_does_not_shrink_multiple_bugs_when_told_not_to`
      - `test_does_not_keep_generating_when_multiple_bugs`
      - `test_shrink_after_max_examples`
      - `test_shrink_after_max_iterations`
      - `test_runs_full_set_of_examples`
      - `test_does_not_shrink_if_replaying_from_database`
      - `test_does_shrink_if_replaying_inexact_from_database`
      - `test_stops_if_hits_interesting_early_and_only_want_one_bug`
      - `test_skips_secondary_if_interesting_is_found`
      - `test_discards_invalid_db_entries`
      - `test_discards_invalid_db_entries_pareto`

    Use `NativeConjectureRunner::new(f, NativeRunnerSettings::new()
    .max_examples(n).database(Some(db)).derandomize(true), rng)
    .with_database_key(key).run()`. Fill in the stubs in
    `src/native/conjecture_runner.rs` as each test lands — the
    runtime `todo!()` panic tells the port-loop which attribute is
    still missing. This cluster may land as several narrower commits
    (grouped by attribute) rather than one mega-commit; split as you
    go if the set feels too large for one invocation.

    Acceptance criteria:
      - All 26 tests compile and pass under
        `cargo test --features native --test hypothesis conjecture_engine::`.
      - The `::test_can_load_data_from_a_corpus` through
        `::test_discards_invalid_db_entries_pareto` bullet in
        `SKIPPED.md`'s `conjecture/test_engine.py::*` cluster is
        removed.

- title: Port conjecture/test_engine.py monkeypatch cluster
  details: |
    Port the following tests from `conjecture/test_engine.py`,
    native-gated. Each uses `monkeypatch.setattr(ConjectureRunner,
    "generate_new_examples", ...)` to seed a specific initial buffer
    or `monkeypatch.setattr(engine_module, "MAX_SHRINKS"|"CACHE_SIZE",
    n)` to cap the shrink/cache loop:
      - `test_terminates_shrinks`
      - `test_shrinks_both_interesting_examples`
      - `test_discarding`
      - `test_shrinking_from_mostly_zero`
      - `test_handles_nesting_of_discard_correctly`
      - `test_prefix_cannot_exceed_buffer_size`
      - `test_will_evict_entries_from_the_cache`
      - `test_simulate_to_evicted_data`

    Port path: call `runner.cached_test_function(seed_choices)`
    explicitly before `runner.run()` to seed the initial buffer; use
    `NativeRunnerSettings::max_shrinks(n)` for the MAX_SHRINKS
    override. Extend `NativeRunnerSettings` with a `cache_size(n)`
    override if needed by `test_will_evict_entries_from_the_cache`;
    don't add Python-style attribute injection.

    Acceptance criteria:
      - All 8 tests compile and pass under
        `cargo test --features native --test hypothesis conjecture_engine::`.
      - The `::test_terminates_shrinks` through
        `::test_simulate_to_evicted_data` bullet in `SKIPPED.md` is
        removed.

- title: Port conjecture/test_engine.py FailedHealthCheck cluster
