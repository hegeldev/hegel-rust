# Pending tasks for the port loop. `scripts/port-loop.py` pops one entry at a
# time and dispatches an agent to handle it before moving on to porting new
# upstream tests. Add entries at any position; remove an entry when it's done.
#
# Schema per entry:
#   - title: one-line summary
#     details: |
#       Multi-line body with context, pointers, acceptance criteria.

  - title: "[CI] check release: RELEASE.md already exists on main"
    details: |
      The "Check release" job in workflow run 24761105753 failed with a
      ValueError raised from .github/scripts/release.py:103. This is an
      environmental / repo-state issue, not a code defect on this branch:
      the release-cutting CI on main is either in progress or has failed
      and left RELEASE.md in place.

      Failing command:
        python .github/scripts/release.py check "$BASE_REF"   (BASE_REF=main)

      Verbatim log excerpt:
        Traceback (most recent call last):
          File ".../.github/scripts/release.py", line 256, in <module>
            check(args.base_ref)
          File ".../.github/scripts/release.py", line 103, in check
            raise ValueError(
        ValueError: RELEASE.md already exists on main. It's possible the
        CI job responsible for cutting a new release is in progress, or
        has failed.
        ##[error]Process completed with exit code 1.

      This was previously triaged and removed as needing human intervention
      (see commit 17d2c8c "Remove TODO for check-release failure (human
      intervention required)"). If it is still failing, the fix agent
      should likewise drop this entry rather than touch release.py — the
      remediation requires either waiting for the in-progress release job
      on main to complete or a human cleaning up RELEASE.md on main.
