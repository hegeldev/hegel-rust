    draw-by-strategy work lands.

    Port path: ensure the draw-by-strategy method translates a
    `gs::nothing()`-equivalent (an always-empty strategy) into a
    `mark_invalid()` call on the test case.

    Acceptance criteria:
      - `test_empty_strategy_is_invalid` compiles and passes.
      - The matching bullet in `SKIPPED.md` is removed.
