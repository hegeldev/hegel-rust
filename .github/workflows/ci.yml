name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal -c rustfmt -c clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Check lint
        run: just check-lint
      - name: Check zizmor
        run: |
          pipx install zizmor==1.23.1
          zizmor --format plain .github/
      - name: Check `cargo package`
        # creates a .crate for distribution and verifies it can build in isolation
        # see https://doc.rust-lang.org/cargo/commands/cargo-package.html
        run: cargo package --workspace

  test:
    # Keep the name matching the branch-protection required checks on Linux
    # (`test (1.86)` / `test (stable)`); Windows variants get a suffix.
    # macOS is intentionally absent for now and will land in a follow-up.
    name: test (${{ matrix.rust }}${{ matrix.os == 'windows-latest' && ', windows' || '' }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: ["1.86", stable]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal && rustup default ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      # Windows Defender real-time scanning of every .obj/.exe/.pdb cargo
      # writes (and of each test binary on execution) is a large tax on the
      # subprocess-heavy integration tests. Excluding the workspace from
      # real-time scanning removes it. No-op on non-Windows runners.
      - name: Exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Run tests
        run: just check-tests

  test-all-features:
    name: test-all-features (${{ matrix.rust }}${{ matrix.os == 'windows-latest' && ', windows' || '' }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows drops `antithesis` because the upstream SDK is
          # Linux-only and emits a `compile_error!` otherwise.
          - os: windows-latest
            rust: "1.86"
            recipe: check-tests-all-features-windows
          - os: windows-latest
            rust: stable
            recipe: check-tests-all-features-windows
          - os: ubuntu-latest
            rust: "1.86"
            recipe: check-tests-all-features
          - os: ubuntu-latest
            rust: stable
            recipe: check-tests-all-features
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal && rustup default ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      # See the note in the `test` job: exclude the workspace from Windows
      # Defender real-time scanning to drop the AV tax on subprocess builds.
      - name: Exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Run tests
        run: just ${{ matrix.recipe }}

  test-c-bindings:
    # Builds libhegel (the C shared/static library in hegel-c/), runs
    # the libloading-based Rust smoke tests, and then compiles every
    # example C program in hegel-c/examples/ against both libhegel.so
    # and libhegel.a, running each binary to check the linking modes
    # actually work end-to-end. Runs on every native runner where we
    # publish a release binary; symbol-visibility, libloading behavior,
    # and Windows-specific calling conventions only get exercised by
    # actually running the smoke tests on each OS. The example C
    # programs are bash-driven and only run on Unix runners.
    name: test-c-bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      # See the note in the `test` job: exclude the workspace from Windows
      # Defender real-time scanning to drop the AV tax on subprocess builds.
      - name: Exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Run C bindings test recipe
        run: just c-test

      # Build libhegel with `panic = "abort"` and re-run the smoke tests + C
      # examples against it. Proves no panic crosses the FFI boundary on the
      # tested paths (an invalid schema that aborted instead of returning
      # HEGEL_E_INVALID_ARG would crash the process and fail this step). The
      # recipe is a no-op on Windows (bash-driven examples).
      - name: Run C bindings under panic=abort
        run: just c-test-abort

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install nightly --profile minimal && rustup default nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Install cargo-docs-rs
        run: cargo install --locked cargo-docs-rs

      - name: Check docs
        run: just check-docs

  # test with the minimal versions of all our dependencies
  test-minimal-versions:
    name: test-minimal-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install nightly --profile minimal && rustup default nightly
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Generate lockfile
        run: cargo generate-lockfile -Z minimal-versions
      - name: Run tests
        run: just check-tests-minimal-versions

  compile-examples:
    name: compile-examples (${{ matrix.rust }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        rust: ["1.86", stable]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal && rustup default ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Compile examples
        run: cargo build --examples --all-features

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for ratchet auto-update
      pull-requests: write  # needed for creating PRs on main
    steps:
      # For fork PRs, head_ref points to a branch that doesn't exist on the base repo,
      # so we fall back to the default ref (the merge commit).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        with:
          persist-credentials: false

      # use an app token so that the commit re-triggers CI. GITHUB_TOKEN pushes don't trigger CI
      - name: Generate app token
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: hegel-rust
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked]
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal -c llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov

      - uses: ./.github/actions/install-tools
        with:
          # `uv` is needed for the `check-coverage.py` script's
          # `#!/usr/bin/env -S uv run --script` shebang.
          tools: just uv

      - name: Run coverage
        run: just check-coverage

      - name: Auto-update coverage annotations and ratchet
        if: success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet; then
            echo "No coverage annotation changes needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u

          if git diff --cached --quiet; then
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git commit -m "Auto-update coverage annotations and ratchet"
            git push
          else
            BRANCH="auto/coverage-ratchet-update"
            git checkout -b "$BRANCH"
            git commit -m "Auto-update coverage annotations and ratchet"
            git push -f origin "$BRANCH"
            gh pr create \
              --title "Auto-update coverage ratchet" \
              --body "The coverage ratchet has tightened on main. This PR updates the ratchet file and removes unnecessary annotations." \
              --base main \
              --head "$BRANCH" || true
          fi

  nix:
    name: nix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
      - uses: ./.github/actions/install-tools
        with:
          tools: just
      - name: lint
        run: just check-format-nix

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-rust'
    needs: [lint, test, test-all-features, test-minimal-versions, docs, coverage, nix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # id-token: "enables the workflow to request and use an OIDC token from GitHub's OIDC provider".
      # Used by our trusted publishing flow
      id-token: write
    # Expose the new tag/version to `release-binaries` (cross-platform cdylib
    # builds). `skipped` lets that job no-op cleanly on non-release pushes;
    # `version` is the post-bump version it tags / uploads against.
    outputs:
      skipped: ${{ steps.check.outputs.skip == 'true' }}
      version: ${{ steps.released-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: hegel-rust

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release

      - name: Capture released version
        id: released-version
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        if: steps.check.outputs.skip != 'true'
        run: rustup toolchain install stable --profile minimal

      - name: Authenticate with crates.io
        if: steps.check.outputs.skip != 'true'
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: crates-io-auth

      - name: Publish hegeltest-macros
        if: steps.check.outputs.skip != 'true'
        run: cargo publish -p hegeltest-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for crates.io index
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION=$(grep '^version' hegel-macros/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "waiting for hegeltest-macros $VERSION to appear on crates.io..."
          for i in $(seq 1 60); do
            if cargo search hegeltest-macros | grep -q "\"$VERSION\""; then
              exit 0
            fi
            sleep 3
          done
          echo "Timed out waiting for hegeltest-macros to appear on Crates.io"
          exit 1

      - name: Publish hegeltest-c
        if: steps.check.outputs.skip != 'true'
        # The engine crate. hegeltest now depends on it, so it must be
        # published (and indexed) before hegeltest. Its other role is to
        # reserve the name; the useful artefact for non-Rust consumers is the
        # `libhegel-<goos>-<goarch>.<ext>` cdylib uploaded by the
        # `release-binaries` job, not this source crate.
        run: cargo publish -p hegeltest-c
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for hegeltest-c on crates.io index
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION=$(grep '^version' hegel-c/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "waiting for hegeltest-c $VERSION to appear on crates.io..."
          for i in $(seq 1 60); do
            if cargo search hegeltest-c | grep -q "\"$VERSION\""; then
              exit 0
            fi
            sleep 3
          done
          echo "Timed out waiting for hegeltest-c to appear on Crates.io"
          exit 1

      - name: Publish hegeltest
        if: steps.check.outputs.skip != 'true'
        run: cargo publish -p hegeltest
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Push to main or open PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/release.py push-or-pr

  # Cross-platform cdylib builds for libhegel (the C-ABI shared library
  # produced by the `hegeltest-c` crate). Triggers after the `release` job
  # has tagged a new version; each matrix entry builds for one Go-style
  # (GOOS, GOARCH) target, renames the cdylib to the
  # `libhegel-<goos>-<goarch>.<ext>` shape that hegel-go's downloader
  # expects, computes a SHA-256 sidecar, and uploads both to the GitHub
  # Release for the just-pushed tag. The first racer creates the release;
  # the rest upload into it with --clobber so re-runs are idempotent.
  release-binaries:
    # `platform` is the primary matrix dimension; the include entries
    # specialise the runner / Rust target / file extension for each
    # platform. Structuring it this way lets GitHub's auto-suffix render
    # cleanly as "release-binaries (linux-amd64)" etc. when the matrix
    # expands, and lets the *skipped* form collapse to a single
    # "release-binaries" entry on non-release pushes — instead of
    # showing the literal `${{ matrix.X }}` template, which GitHub does
    # not interpolate when a job-level `if:` evaluates to false before
    # matrix expansion.
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-rust' && needs.release.outputs.skipped != 'true'
    needs: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-amd64
          - linux-arm64
          - darwin-arm64
          - windows-amd64
          - windows-arm64
        include:
          - { platform: linux-amd64,   runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu,    goos: linux,   goarch: amd64, ext: so }
          - { platform: linux-arm64,   runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu,   goos: linux,   goarch: arm64, ext: so }
          # Intel macOS (darwin-amd64) is intentionally not built: the
          # macos-13 (x86_64) runners are scarce and routinely leave the
          # release job stuck for hours waiting for a runner, and we do not
          # support Intel Macs. Apple-silicon macOS is covered below.
          - { platform: darwin-arm64,  runner: macos-14,         target: aarch64-apple-darwin,        goos: darwin,  goarch: arm64, ext: dylib }
          - { platform: windows-amd64, runner: windows-latest,   target: x86_64-pc-windows-msvc,      goos: windows, goarch: amd64, ext: dll }
          # aarch64-pc-windows-msvc is cross-compiled from the x86_64 runner.
          # MSVC has had built-in arm64 cross since VS 2017+ and
          # windows-latest ships the toolchain.
          - { platform: windows-arm64, runner: windows-latest,   target: aarch64-pc-windows-msvc,     goos: windows, goarch: arm64, ext: dll }
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # The release job tags before pushing the bump commit; fetch
          # tags so we can check out the new tag rather than gambling on
          # main's HEAD pointer.
          fetch-depth: 0
          ref: refs/tags/v${{ needs.release.outputs.version }}

      - name: Install Rust + target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build cdylib
        run: cargo build -p hegeltest-c --release --target ${{ matrix.target }}

      - name: Stage asset + sha256
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          asset="libhegel-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.ext }}"
          case "${{ matrix.goos }}" in
            windows) built="target/${{ matrix.target }}/release/hegel_c.dll" ;;
            darwin)  built="target/${{ matrix.target }}/release/libhegel_c.dylib" ;;
            linux)   built="target/${{ matrix.target }}/release/libhegel_c.so" ;;
            *) echo "unknown goos: ${{ matrix.goos }}" >&2; exit 1 ;;
          esac
          if [ ! -f "$built" ]; then
            echo "expected cdylib output $built missing" >&2
            ls -la "target/${{ matrix.target }}/release/" || true
            exit 1
          fi
          cp "$built" "$asset"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            # macOS doesn't ship sha256sum but ships shasum.
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ${{ steps.stage.outputs.asset }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          asset="$ASSET"
          # The first racer creates the Release; the rest see "already
          # exists" from `gh release create` and fall through to upload.
          # `--clobber` makes re-runs (e.g. after a flaked build) idempotent.
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --notes "libhegel binaries for $tag. See CHANGELOG.md for the full changelog." \
              || true
          fi
          gh release upload "$tag" "$asset" "$asset.sha256" --clobber

  # Independent post-condition check that every expected libhegel asset is
  # present on the Release. `release-binaries` uses `fail-fast: false` so
  # failed-platform diagnostics aren't lost; this aggregator job fails
  # loudly when any expected asset (or its sidecar) is missing, satisfying
  # go-reports.md item 6: "Update the release workflow to fail if any
  # expected asset is missing."
  release-binaries-verify:
    name: release-binaries-verify
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-rust' && needs.release.outputs.skipped != 'true'
    needs: [release, release-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Check that every expected asset uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          expected=(
            libhegel-linux-amd64.so
            libhegel-linux-arm64.so
            libhegel-darwin-arm64.dylib
            libhegel-windows-amd64.dll
            libhegel-windows-arm64.dll
          )
          actual=$(gh release view "$tag" --repo "$REPO" --json assets --jq '.assets[].name')
          missing=()
          for a in "${expected[@]}"; do
            grep -qxF "$a" <<<"$actual" || missing+=("$a")
            grep -qxF "$a.sha256" <<<"$actual" || missing+=("$a.sha256")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Release $tag is missing assets:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All expected libhegel assets present on $tag."

  # Notify each downstream language binding that a new libhegel release is live
  # so it can bump its pinned version. One matrix entry per consumer repo.
  # Gated on `release-binaries-verify`, not just `release`: the downstream bumps
  # read the per-asset SHA-256 digests off this release, so we only dispatch
  # once every libhegel binary is confirmed uploaded. `fail-fast: false` keeps a
  # dispatch failure for one repo from cancelling the others.
  bump-libhegel:
    name: bump-libhegel
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-rust' && needs.release.outputs.skipped != 'true'
    needs: [release, release-binaries-verify]
    runs-on: ubuntu-latest
    # The cross-repo dispatch uses the app token below, not GITHUB_TOKEN.
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        repo: [hegel-go, hegel-ocaml]
    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.repo }}

      - name: Dispatch hegel-rust-release to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.version }}
          REPO: ${{ matrix.repo }}
        run: |
          gh api "repos/hegeldev/$REPO/dispatches" \
            -f event_type=hegel-rust-release \
            -F "client_payload[version]=$VERSION"
