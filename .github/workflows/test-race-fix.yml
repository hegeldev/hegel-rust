name: Test Race Fix

on:
  push:
    branches: [DRMacIver/debug-pr-please-ignore]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-race-fix:
    name: test-race-fix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HEGEL_SERVER_LOG_DIR: ${{ github.workspace }}/server-logs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just uv

      # Install hegel-core from the atomic-stream-allocation branch (PR #98)
      - name: Setup hegel-core from branch
        run: |
          set -euo pipefail
          git clone --branch DRMacIver/atomic-stream-allocation --depth 1 \
            https://github.com/hegeldev/hegel-core.git /tmp/hegel-core-branch
          cd /tmp/hegel-core-branch
          python -m venv .venv
          source .venv/bin/activate
          pip install --editable .

      - name: Test with branch hegel-core
        run: |
          set -euo pipefail
          source /tmp/hegel-core-branch/.venv/bin/activate
          export HEGEL_SERVER_COMMAND=$(which hegel)
          echo "Using hegel-core from DRMacIver/atomic-stream-allocation branch"
          hegel --version

          for i in {1..20}; do
            echo "=== Iteration $i ==="
            cargo test --all-features || {
              echo "Tests failed on iteration $i"
              exit 1
            }
          done

          echo "All 20 iterations passed with no failure"

      - name: Print server logs
        if: always()
        shell: bash
        run: |
          set +e
          dir="${HEGEL_SERVER_LOG_DIR:-}"
          echo "HEGEL_SERVER_LOG_DIR=$dir"
          if [ -z "$dir" ] || [ ! -d "$dir" ]; then
            echo "Log dir not set or does not exist."
            exit 0
          fi
          echo "Contents of $dir:"
          ls -la "$dir" 2>&1
          echo
          shopt -s nullglob
          files=( "$dir"/server.*.log )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No server.*.log files in $dir."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done