name: Install tools
inputs:
  tools:
    required: true
runs:
  using: composite
  steps:
    - id: parse
      env:
        TOOLS: ${{ inputs.tools }}
      run: |
        for tool in $TOOLS; do
          case "$tool" in
            just|uv) echo "$tool=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unknown tool: $tool"; exit 1 ;;
          esac
        done
      shell: bash
    # Install `just` from its prebuilt GitHub-release binary instead of the
    # per-OS package managers (apt/choco/brew). The package-manager path hung
    # intermittently on hosted runners — `sudo apt-get` blocks on the dpkg lock
    # held by unattended-upgrades. 
    - if: steps.parse.outputs.just == 'true'
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
    - if: steps.parse.outputs.uv == 'true'
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
