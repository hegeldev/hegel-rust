language = "C"
header = """
/*
 * libhegel — C bindings for Hegel's native property-based testing engine.
 *
 * This header is generated from hegel-c/src/lib.rs by cbindgen. Do not
 * edit it directly; re-run `just c-header` after changing the Rust source.
 */"""
include_guard = "HEGEL_H"
pragma_once = false
cpp_compat = true
sys_includes = ["stddef.h", "stdint.h", "stdbool.h"]
no_includes = true
tab_width = 4
documentation = true
documentation_style = "c"
style = "type"
usize_is_size_t = true

[export.rename]
"HegelRun" = "hegel_run_t"
"HegelSettings" = "hegel_settings_t"
"HegelTestCase" = "hegel_test_case_t"
"HegelRunResult" = "hegel_run_result_t"
"HegelFailure" = "hegel_failure_t"

# Enums kept in PascalCase form so prefix_with_name produces clean
# HEGEL_STATUS_VALID-style variants instead of HEGEL_STATUS_T_VALID.

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
